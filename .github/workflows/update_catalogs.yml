name: Update catalogs

on:
  schedule:
    # 05:00 UTC-06:00 == 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-catalogs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scrapers
        run: |
          python scripts/scrape_toyota_tabasco.py --out data/catalog.json
          python scripts/scrape_nissan_deportiva.py --out data/nissan.json

      - name: Generate static pages + sitemap
        run: |
          python scripts/generate_static_pages.py --site-url "https://unknownshopper.github.io/eltabasqueno"

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/catalog.json data/nissan.json sitemap.xml robots.txt marcas modelos
          git commit -m "chore(data): update catalogs and pages"
          git push
